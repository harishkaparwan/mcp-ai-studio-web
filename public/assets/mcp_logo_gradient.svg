<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(490 210) rotate(8) scale(560 260)">
      <stop offset="0" stop-color="#5D2EF6" stop-opacity="0.42"/>
      <stop offset="0.35" stop-color="#111827" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#050816" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="cubeA" x1="130" y1="105" x2="470" y2="335" gradientUnits="userSpaceOnUse">
      <stop stop-color="#26F5FF"/>
      <stop offset="0.35" stop-color="#1573FF"/>
      <stop offset="0.7" stop-color="#8D35FF"/>
      <stop offset="1" stop-color="#FF2CCF"/>
    </linearGradient>
    <linearGradient id="cubeB" x1="120" y1="285" x2="355" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#082B75"/>
      <stop offset="0.45" stop-color="#2741D8"/>
      <stop offset="1" stop-color="#22F4F5"/>
    </linearGradient>
    <linearGradient id="cubeC" x1="280" y1="340" x2="470" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7328FF"/>
      <stop offset="0.55" stop-color="#FF2BCB"/>
      <stop offset="1" stop-color="#22F4F5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="490" y1="100" x2="1150" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2BF1FF"/>
      <stop offset="0.28" stop-color="#7A4DFF"/>
      <stop offset="0.52" stop-color="#FF3FC5"/>
      <stop offset="0.73" stop-color="#FFD447"/>
      <stop offset="1" stop-color="#20E6DF"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.4  0 1 0 0 0.1  0 0 1 0 1  0 0 0 0.7 0" result="colored"/>
      <feMerge><feMergeNode in="colored"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <style>
      .outline{stroke:#08111F;stroke-width:4;stroke-linejoin:round;}
      .edge{stroke:url(#cubeA);stroke-width:9;stroke-linecap:round;filter:url(#glow);}
      .node{stroke:#1E1645;stroke-width:4;filter:url(#glow);}
      .shine{fill:white;opacity:.28;}
      .word{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900;letter-spacing:2px;}
    </style>
  </defs>

  <rect width="1200" height="430" fill="url(#bgGlow)"/>
  <rect width="1200" height="430" fill="#020617" opacity="0.68"/>

  <g transform="translate(60 44)" filter="url(#softShadow)">
    <!-- Top cube -->
    <polygon class="outline" fill="url(#cubeA)" points="184,22 286,80 286,196 184,254 82,196 82,80" opacity=".93"/>
    <polygon fill="#35F3FF" opacity=".55" points="184,22 286,80 184,139 82,80"/>
    <polygon fill="#101A86" opacity=".45" points="82,80 184,139 184,254 82,196"/>
    <polygon fill="#FF35D2" opacity=".58" points="286,80 184,139 184,254 286,196"/>
    <path class="shine" d="M112 84l72-41 71 41-72 41z"/>

    <!-- Bottom-left cube -->
    <polygon class="outline" fill="url(#cubeB)" points="102,162 204,220 204,336 102,394 0,336 0,220" opacity=".94" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#22EAFB" opacity=".42" points="120,172 208,222 120,272 32,222" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#06184C" opacity=".7" points="32,222 120,272 120,372 32,322" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#7739FF" opacity=".5" points="208,222 120,272 120,372 208,322" transform="scale(.86) translate(32 8)"/>

    <!-- Bottom-right cube -->
    <polygon class="outline" fill="url(#cubeC)" points="300,162 402,220 402,336 300,394 198,336 198,220" opacity=".95" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#20F1EF" opacity=".38" points="318,172 406,222 318,272 230,222" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#5A20FF" opacity=".45" points="230,222 318,272 318,372 230,322" transform="scale(.86) translate(32 8)"/>
    <polygon fill="#FF31C8" opacity=".68" points="406,222 318,272 318,372 406,322" transform="scale(.86) translate(32 8)"/>

    <!-- Network edges -->
    <path class="edge" d="M184 139 L184 254 M184 139 L286 80 M184 139 L82 80 M184 254 L118 226 M184 254 L250 226 M184 254 L184 322 M118 226 L58 258 M250 226 L310 258"/>

    <!-- Nodes -->
    <circle class="node" cx="184" cy="139" r="16" fill="#4FE8FF"/>
    <circle class="node" cx="286" cy="80" r="16" fill="#FA4AD7"/>
    <circle class="node" cx="82" cy="80" r="16" fill="#1CDAF3"/>
    <circle class="node" cx="184" cy="254" r="18" fill="#7442FF"/>
    <circle class="node" cx="118" cy="226" r="15" fill="#1599FF"/>
    <circle class="node" cx="250" cy="226" r="15" fill="#D94BFF"/>
    <circle class="node" cx="58" cy="258" r="15" fill="#0FA4FF"/>
    <circle class="node" cx="310" cy="258" r="15" fill="#EB5AFF"/>
    <circle class="node" cx="184" cy="322" r="14" fill="#6938FF"/>
  </g>

  <g filter="url(#glow)">
    <text x="490" y="210" class="word" font-size="130px" fill="url(#textGrad)" stroke="#09111F" stroke-width="4">MCP</text>
    <text x="490" y="210" class="word" font-size="130px" fill="none" stroke="white" stroke-width="1.5" opacity="0.35">MCP</text>
    <text x="494" y="350" class="word" font-size="90px" fill="url(#textGrad)" stroke="#09111F" stroke-width="3">AI Studio</text>
    <text x="494" y="350" class="word" font-size="90px" fill="none" stroke="white" stroke-width="1" opacity="0.35">AI Studio</text>
  </g>
</svg>